<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF | UltraConvert Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4338ca; --accent: #6366f1; --bg-body: #0f172a; --bg-surface: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8; --border: #334155; --success: #10b981; --danger: #ef4444; --radius-lg: 16px; --radius-md: 10px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .back-link { color: var(--text-sub); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; transition: 0.3s; }
        .back-link:hover { color: var(--primary); }
        .main { flex: 1; padding: 2rem; }
        .tool-header { text-align: center; margin-bottom: 2rem; }
        .tool-header h1 { font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tool-header p { color: var(--text-sub); }
        .upload-card { background: var(--bg-surface); border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 3rem; text-align: center; cursor: pointer; transition: 0.3s; max-width: 600px; margin: 0 auto 2rem; }
        .upload-card:hover { border-color: var(--primary); background: rgba(67, 56, 202, 0.05); }
        .upload-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem; color: white; }
        .btn { padding: 0.85rem 1.5rem; border-radius: var(--radius-md); border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: 0.3s; font-size: 0.95rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(67, 56, 202, 0.4); }
        .btn-success { background: var(--success); color: white; }
        .btn:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; max-width: 1000px; margin: 0 auto 2rem; }
        .image-card { background: var(--bg-surface); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); position: relative; }
        .image-preview { height: 150px; display: flex; align-items: center; justify-content: center; background: var(--bg-body); }
        .image-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .remove-btn { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; border-radius: 50%; background: var(--danger); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .action-bar { text-align: center; }
        .loader-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-bottom-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 1rem; } .main { padding: 1rem; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="brand"><i class="fa-solid fa-shapes"></i> UltraConvert Pro</a>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </header>
    <main class="main">
        <div class="tool-header">
            <h1><i class="fa-solid fa-file-image"></i> Image to PDF Converter</h1>
            <p>Convert images (JPG, PNG, WebP) to PDF documents</p>
        </div>
        <div class="upload-card" id="dropZone">
            <input type="file" id="fileInput" accept="image/*" hidden multiple>
            <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
            <h3 style="margin-bottom: 0.5rem;">Add Images</h3>
            <p style="color: var(--text-sub); margin-bottom: 1.5rem;">Drag & drop or click to add images</p>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Select Images</button>
        </div>
        <div class="images-grid" id="imagesGrid"></div>
        <div class="action-bar">
            <button class="btn btn-success" id="convertBtn" disabled>
                <i class="fa-solid fa-bolt"></i> Convert to PDF
            </button>
        </div>
    </main>
    <div class="loader-modal" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 600;">Converting...</p>
    </div>
    <script>
        const { jsPDF } = window.jspdf;
        let imagesArray = [];
        const els = { dropZone: document.getElementById('dropZone'), fileInput: document.getElementById('fileInput'), imagesGrid: document.getElementById('imagesGrid'), convertBtn: document.getElementById('convertBtn'), loader: document.getElementById('loader') };
        els.fileInput.addEventListener('change', (e) => addImages(e.target.files));
        els.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); els.dropZone.style.borderColor = 'var(--primary)'; });
        els.dropZone.addEventListener('dragleave', () => { els.dropZone.style.borderColor = 'var(--border)'; });
        els.dropZone.addEventListener('drop', (e) => { e.preventDefault(); els.dropZone.style.borderColor = 'var(--border)'; if(e.dataTransfer.files.length > 0) addImages(e.dataTransfer.files); });
        els.convertBtn.addEventListener('click', convertToPDF);
        function addImages(fileList) {
            for (let file of fileList) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        imagesArray.push({ file: file, dataUrl: e.target.result, id: Date.now() + Math.random() });
                        renderImages();
                    };
                    reader.readAsDataURL(file);
                } else { alert(`${file.name} is not an image file.`); }
            }
        }
        function renderImages() {
            if (imagesArray.length === 0) { els.imagesGrid.innerHTML = ''; els.convertBtn.disabled = true; return; }
            els.convertBtn.disabled = false;
            els.imagesGrid.innerHTML = imagesArray.map((img, index) => `
                <div class="image-card">
                    <button class="remove-btn" onclick="removeImage(${index})"><i class="fa-solid fa-times"></i></button>
                    <div class="image-preview"><img src="${img.dataUrl}" alt="Image ${index + 1}"></div>
                    <div style="padding: 0.75rem; text-align: center; font-size: 0.85rem; color: var(--text-sub);">${index + 1}</div>
                </div>
            `).join('');
        }
        function removeImage(index) { imagesArray.splice(index, 1); renderImages(); }
        async function convertToPDF() {
            if (imagesArray.length === 0) return;
            els.loader.style.display = 'flex';
            try {
                const pdf = new jsPDF();
                for (let i = 0; i < imagesArray.length; i++) {
                    if (i > 0) pdf.addPage();
                    const imgData = imagesArray[i].dataUrl;
                    const imgProps = pdf.getImageProperties(imgData);
                    const pdfWidth = pdf.internal.pageSize.getWidth() - 20;
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    pdf.addImage(imgData, 'JPEG', 10, 10, pdfWidth, pdfHeight);
                }
                pdf.save('converted_images.pdf');
                els.loader.style.display = 'none';
                setTimeout(() => alert('Images converted successfully!'), 500);
            } catch (err) { console.error(err); alert('Error converting images.'); els.loader.style.display = 'none'; }
        }
    </script>
</body>
</html>
