<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF | UltraConvert Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4338ca;
            --primary-dark: #3730a3;
            --accent: #6366f1;
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .back-link {
            color: var(--text-sub);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--primary); }

        .main { flex: 1; padding: 2rem; }

        .tool-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .tool-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tool-header p { color: var(--text-sub); }

        .upload-card {
            background: var(--bg-surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .upload-card:hover { border-color: var(--primary); background: rgba(67, 56, 202, 0.05); }

        .upload-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
            color: white;
        }

        .files-container {
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        .file-list {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-body);
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
        }

        .file-item:last-child { margin-bottom: 0; }

        .file-icon {
            width: 48px; height: 48px;
            background: rgba(67, 56, 202, 0.2);
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            font-size: 1.25rem;
        }

        .file-info { flex: 1; }
        .file-name { font-weight: 600; margin-bottom: 0.25rem; }
        .file-size { font-size: 0.85rem; color: var(--text-sub); }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 36px; height: 36px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .btn-up { background: rgba(67, 56, 202, 0.2); color: var(--primary); }
        .btn-up:hover { background: var(--primary); color: white; }

        .btn-down { background: rgba(67, 56, 202, 0.2); color: var(--primary); }
        .btn-down:hover { background: var(--primary); color: white; }

        .btn-remove { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .btn-remove:hover { background: var(--danger); color: white; }

        .action-bar {
            text-align: center;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(67, 56, 202, 0.4); }
        .btn:disabled { background: #475569; cursor: not-allowed; transform: none; }

        .loader-modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(5px); z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--border);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-sub);
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 1rem; }
            .main { padding: 1rem; }
            .upload-card { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="brand">
            <i class="fa-solid fa-shapes"></i> UltraConvert Pro
        </a>
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </header>

    <main class="main">
        <div class="tool-header">
            <h1><i class="fa-solid fa-object-group"></i> Merge PDF Files</h1>
            <p>Combine multiple PDF files into one document</p>
        </div>

        <div class="upload-card" id="dropZone">
            <input type="file" id="fileInput" accept="application/pdf" hidden multiple>
            <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
            <h3 style="margin-bottom: 0.5rem;">Add PDF Files</h3>
            <p style="color: var(--text-sub); margin-bottom: 1.5rem;">Drag & drop or click to add files</p>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Select Files</button>
        </div>

        <div class="files-container">
            <div class="file-list" id="fileList">
                <div class="empty-state">
                    <i class="fa-solid fa-file-pdf" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                    <p>No files added yet. Upload PDF files to merge.</p>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-primary" id="mergeBtn" disabled>
                    <i class="fa-solid fa-bolt"></i> Merge PDFs
                </button>
            </div>
        </div>
    </main>

    <div class="loader-modal" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 600;">Merging PDFs...</p>
        <p id="progressText" style="font-size: 0.85rem; color: var(--text-sub);">Processing</p>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let filesArray = [];

        const els = {
            dropZone: document.getElementById('dropZone'),
            fileInput: document.getElementById('fileInput'),
            fileList: document.getElementById('fileList'),
            mergeBtn: document.getElementById('mergeBtn'),
            loader: document.getElementById('loader'),
            progressText: document.getElementById('progressText')
        };

        els.fileInput.addEventListener('change', (e) => addFiles(e.target.files));

        els.dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            els.dropZone.style.borderColor = 'var(--primary)';
        });

        els.dropZone.addEventListener('dragleave', () => {
            els.dropZone.style.borderColor = 'var(--border)';
        });

        els.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            els.dropZone.style.borderColor = 'var(--border)';
            if(e.dataTransfer.files.length > 0) addFiles(e.dataTransfer.files);
        });

        els.mergeBtn.addEventListener('click', mergePDFs);

        function addFiles(fileList) {
            for (let file of fileList) {
                if (file.type === 'application/pdf') {
                    filesArray.push({
                        file: file,
                        id: Date.now() + Math.random()
                    });
                } else {
                    alert(`${file.name} is not a PDF file.`);
                }
            }
            renderFileList();
        }

        function renderFileList() {
            if (filesArray.length === 0) {
                els.fileList.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-file-pdf" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>No files added yet. Upload PDF files to merge.</p>
                    </div>
                `;
                els.mergeBtn.disabled = true;
                return;
            }

            els.mergeBtn.disabled = filesArray.length < 2;

            els.fileList.innerHTML = filesArray.map((item, index) => `
                <div class="file-item" data-id="${item.id}">
                    <div class="file-icon">
                        <i class="fa-solid fa-file-pdf"></i>
                    </div>
                    <div class="file-info">
                        <div class="file-name">${item.file.name}</div>
                        <div class="file-size">${formatFileSize(item.file.size)} • ${index + 1}${getOrdinal(index + 1)}</div>
                    </div>
                    <div class="file-actions">
                        ${index > 0 ? `<button class="btn-icon btn-up" onclick="moveFile(${index}, -1)" title="Move Up"><i class="fa-solid fa-arrow-up"></i></button>` : '<div style="width:36px"></div>'}
                        ${index < filesArray.length - 1 ? `<button class="btn-icon btn-down" onclick="moveFile(${index}, 1)" title="Move Down"><i class="fa-solid fa-arrow-down"></i></button>` : '<div style="width:36px"></div>'}
                        <button class="btn-icon btn-remove" onclick="removeFile(${index})" title="Remove"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function moveFile(index, direction) {
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < filesArray.length) {
                [filesArray[index], filesArray[newIndex]] = [filesArray[newIndex], filesArray[index]];
                renderFileList();
            }
        }

        function removeFile(index) {
            filesArray.splice(index, 1);
            renderFileList();
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getOrdinal(n) {
            const s = ["th", "st", "nd", "rd"];
            const v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        async function mergePDFs() {
            if (filesArray.length < 2) return;

            els.loader.style.display = 'flex';

            try {
                const mergedPdf = await PDFDocument.create();

                for (let i = 0; i < filesArray.length; i++) {
                    els.progressText.innerText = `Adding file ${i + 1} of ${filesArray.length}...`;

                    const fileData = await filesArray[i].file.arrayBuffer();
                    const pdf = await PDFDocument.load(fileData);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());

                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                els.progressText.innerText = 'Saving merged PDF...';
                const pdfBytes = await mergedPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });

                saveAs(blob, 'merged_document.pdf');

                els.loader.style.display = 'none';

                setTimeout(() => {
                    alert('PDFs merged successfully!');
                }, 500);

            } catch (err) {
                console.error(err);
                alert('Error merging PDFs. Please try again.');
                els.loader.style.display = 'none';
            }
        }
    </script>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</body>
</html>
