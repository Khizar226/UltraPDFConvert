<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UltraConvert | Functional Suite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Default: Indigo */
            --primary: #4338ca; --primary-dark: #3730a3;
            --bg-body: #f8fafc; --bg-surface: #ffffff;
            --text-main: #0f172a; --text-sub: #64748b;
            --border: #e2e8f0;
            --sidebar-width: 280px;
        }

        /* Dynamic Themes */
        body.theme-img { --primary: #db2777; --primary-dark: #be185d; } /* Pink */
        body.theme-merge { --primary: #059669; --primary-dark: #047857; } /* Green */
        body.theme-split { --primary: #ea580c; --primary-dark: #c2410c; } /* Orange */

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, border-color 0.3s; }
        
        body { background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* --- Sidebar --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-surface);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 1.5rem; flex-shrink: 0;
        }

        .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; }
        .nav-item {
            display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem 1rem;
            color: var(--text-sub); border-radius: 10px; font-weight: 600;
            margin-bottom: 0.25rem; cursor: pointer; font-size: 0.9rem;
        }
        .nav-item:hover { background: #f1f5f9; color: var(--primary); }
        .nav-item.active { background: #e0e7ff; color: var(--primary); border: 1px solid var(--border); }
        /* Dynamic active states for themes */
        body.theme-img .nav-item.active { background: #fce7f3; color: #db2777; }
        body.theme-merge .nav-item.active { background: #d1fae5; color: #059669; }

        /* --- Main Content --- */
        .main { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }

        .header {
            height: 70px; background: var(--bg-surface); border-bottom: 1px solid var(--border);
            padding: 0 2rem; display: flex; align-items: center; justify-content: space-between;
        }

        .scroll-area { flex: 1; padding: 2rem; overflow-y: auto; }

        /* Upload Area */
        .upload-card {
            background: var(--bg-surface); border: 2px dashed var(--border);
            border-radius: 16px; padding: 3rem 1rem; text-align: center;
            cursor: pointer; transition: 0.2s; max-width: 600px; margin: 0 auto;
        }
        .upload-card:hover { border-color: var(--primary); background: #f8fafc; }
        .upload-icon {
            width: 50px; height: 50px; background: var(--bg-body); color: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin: 0 auto 1rem;
        }

        /* Results & Action Bar */
        .action-bar {
            display: none; justify-content: space-between; align-items: center;
            background: var(--bg-surface); padding: 1rem; border-radius: 12px;
            margin-bottom: 1.5rem; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .action-bar.visible { display: flex; }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn:hover { filter: brightness(110%); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem; margin-top: 1rem;
        }
        
        .file-item {
            background: #fff; border: 1px solid var(--border); border-radius: 8px;
            padding: 0.5rem; display: flex; flex-direction: column; align-items: center;
            position: relative;
        }
        .file-item img { max-width: 100%; height: 120px; object-fit: contain; border-radius: 4px; }
        .file-name { font-size: 0.75rem; margin-top: 0.5rem; color: var(--text-sub); text-align: center; overflow: hidden; white-space: nowrap; width: 100%; text-overflow: ellipsis; }

        /* Loader */
        .loader-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            z-index: 50; display: none; align-items: center; justify-content: center; flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; padding: 1rem; overflow-x: auto; border-right: none; border-top: 1px solid var(--border); order: 2; }
            .brand { display: none; }
            .nav-item { white-space: nowrap; margin: 0 0.5rem 0 0; }
            .main { order: 1; height: calc(100vh - 80px); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand"><i class="fa-solid fa-layer-group"></i> UltraConvert</div>
        
        <div style="font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 10px;">WORKING TOOLS</div>
        
        <div class="nav-item active" onclick="app.switchMode('pdf-to-img')">
            <i class="fa-solid fa-file-pdf"></i> PDF to Image
        </div>
        <div class="nav-item" onclick="app.switchMode('img-to-pdf')">
            <i class="fa-solid fa-images"></i> Image to PDF
        </div>
        <div class="nav-item" onclick="app.switchMode('merge-pdf')">
            <i class="fa-solid fa-object-group"></i> Merge PDFs
        </div>
        <div class="nav-item" onclick="app.switchMode('compress-pdf')">
            <i class="fa-solid fa-compress"></i> Compress PDF
        </div>
        
        <div style="margin-top: auto; font-size: 0.8rem; color: #94a3b8; padding-top: 1rem; border-top: 1px solid #e2e8f0;">
            Designed by <a href="https://www.linkedin.com/in/khizar226" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 700;">Khizar Hayat</a>
        </div>
    </nav>

    <main class="main">
        <header class="header">
            <h2 id="pageTitle">PDF to Image</h2>
        </header>

        <div class="scroll-area">
            <div class="action-bar" id="actionBar">
                <div id="statusText">0 files ready</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" id="clearBtn" style="background: #ef4444;">Clear</button>
                    <button class="btn" id="processBtn">Convert Now</button>
                </div>
            </div>

            <div class="upload-card" id="dropZone">
                <input type="file" id="fileInput" hidden multiple>
                <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                <h3 id="uploadTitle">Drop PDF here</h3>
                <p style="color: var(--text-sub); margin-bottom: 1.5rem;">or click to browse</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">Select Files</button>
            </div>

            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </main>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 600;" id="loaderText">Processing...</p>
    </div>

    <script>
        // --- APP ENGINE ---
        const app = {
            mode: 'pdf-to-img', // default
            files: [],
            
            init: () => {
                // PDF.js worker setup
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                
                // Event Listeners
                document.getElementById('fileInput').addEventListener('change', (e) => app.handleFiles(e.target.files));
                document.getElementById('processBtn').addEventListener('click', app.process);
                document.getElementById('clearBtn').addEventListener('click', app.reset);
                
                // Drag & Drop
                const dz = document.getElementById('dropZone');
                dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.background = '#f0f9ff'; });
                dz.addEventListener('dragleave', (e) => { dz.style.background = 'var(--bg-surface)'; });
                dz.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dz.style.background = 'var(--bg-surface)';
                    app.handleFiles(e.dataTransfer.files);
                });
            },

            switchMode: (newMode) => {
                app.mode = newMode;
                app.reset(); // Clear previous data

                // UI Updates
                const titles = {
                    'pdf-to-img': 'PDF to Image',
                    'img-to-pdf': 'Image to PDF',
                    'merge-pdf': 'Merge Multiple PDFs',
                    'compress-pdf': 'Compress PDF'
                };
                
                const themes = {
                    'pdf-to-img': '',
                    'img-to-pdf': 'theme-img',
                    'merge-pdf': 'theme-merge',
                    'compress-pdf': 'theme-split'
                };

                const accepts = {
                    'pdf-to-img': 'application/pdf',
                    'img-to-pdf': 'image/*',
                    'merge-pdf': 'application/pdf',
                    'compress-pdf': 'application/pdf'
                };

                // Update Text & Class
                document.getElementById('pageTitle').innerText = titles[newMode];
                document.getElementById('uploadTitle').innerText = `Upload for ${titles[newMode]}`;
                document.body.className = themes[newMode];
                document.getElementById('fileInput').accept = accepts[newMode];

                // Update Sidebar Active State
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                event.currentTarget.classList.add('active');
            },

            handleFiles: (fileList) => {
                const files = Array.from(fileList);
                if (files.length === 0) return;

                // Validation logic
                if (app.mode === 'pdf-to-img' || app.mode === 'compress-pdf') {
                    if (files.length > 1) { alert("Please upload 1 PDF at a time for this tool."); return; }
                    if (files[0].type !== 'application/pdf') { alert("Not a PDF!"); return; }
                }

                app.files = app.files.concat(files);
                app.updateUI();
            },

            updateUI: () => {
                const grid = document.getElementById('resultsGrid');
                const actionBar = document.getElementById('actionBar');
                const dropZone = document.getElementById('dropZone');

                if (app.files.length > 0) {
                    actionBar.classList.add('visible');
                    dropZone.style.display = 'none';
                    document.getElementById('statusText').innerText = `${app.files.length} file(s) loaded`;
                    
                    // Preview (simplified)
                    grid.innerHTML = '';
                    app.files.forEach((f, idx) => {
                        const div = document.createElement('div');
                        div.className = 'file-item';
                        div.innerHTML = `
                            <i class="fa-solid fa-file${app.mode === 'img-to-pdf' ? '-image' : '-pdf'}" style="font-size: 3rem; color: var(--text-sub); margin: 1rem 0;"></i>
                            <div class="file-name">${f.name}</div>
                        `;
                        grid.appendChild(div);
                    });
                } else {
                    actionBar.classList.remove('visible');
                    dropZone.style.display = 'block';
                    grid.innerHTML = '';
                }
            },

            reset: () => {
                app.files = [];
                document.getElementById('fileInput').value = '';
                app.updateUI();
            },

            loader: (show, text = "Processing...") => {
                const l = document.getElementById('loader');
                document.getElementById('loaderText').innerText = text;
                l.style.display = show ? 'flex' : 'none';
            },

            // --- MAIN PROCESSING LOGIC ---
            process: async () => {
                app.loader(true);
                try {
                    if (app.mode === 'pdf-to-img') await app.runPdfToImg();
                    else if (app.mode === 'img-to-pdf') await app.runImgToPdf();
                    else if (app.mode === 'merge-pdf') await app.runMergePdf();
                    else if (app.mode === 'compress-pdf') await app.runCompress();
                } catch (err) {
                    console.error(err);
                    alert("An error occurred: " + err.message);
                }
                app.loader(false);
            },

            // 1. PDF to Image (Existing Logic)
            runPdfToImg: async () => {
                const file = app.files[0];
                const data = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(data).promise;
                const zip = new JSZip();

                for (let i = 1; i <= pdf.numPages; i++) {
                    app.loader(true, `Converting page ${i}/${pdf.numPages}`);
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
                    zip.file(`page-${i}.jpg`, imgData, {base64: true});
                }
                
                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, `${file.name.replace('.pdf','')}-images.zip`);
            },

            // 2. Image to PDF (New Logic)
            runImgToPdf: async () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                for (let i = 0; i < app.files.length; i++) {
                    const file = app.files[i];
                    app.loader(true, `Adding image ${i+1}/${app.files.length}`);
                    
                    // Read file as DataURL
                    const dataUrl = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result);
                        reader.readAsDataURL(file);
                    });

                    const imgProps = doc.getImageProperties(dataUrl);
                    const pdfWidth = doc.internal.pageSize.getWidth();
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

                    if (i > 0) doc.addPage();
                    doc.addImage(dataUrl, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                }
                
                doc.save("converted-images.pdf");
            },

            // 3. Merge PDFs (New Logic)
            runMergePdf: async () => {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                for (let i = 0; i < app.files.length; i++) {
                    app.loader(true, `Merging file ${i+1}/${app.files.length}`);
                    const arrayBuffer = await app.files[i].arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                const pdfBytes = await mergedPdf.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                saveAs(blob, "merged-document.pdf");
            },
            
            // 4. Compress PDF (Basic Logic)
            runCompress: async () => {
                alert("Client-side compression is limited. We will remove metadata and optimize rendering.");
                // Simply reloading and saving with PDF-lib removes some metadata and unused objects
                const { PDFDocument } = PDFLib;
                const arrayBuffer = await app.files[0].arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                const pdfBytes = await pdfDoc.save({ useObjectStreams: false }); // Sometimes reducing streams helps compatibility
                
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                saveAs(blob, `compressed-${app.files[0].name}`);
            }
        };

        // Start
        app.init();
    </script>
</body>
</html>
